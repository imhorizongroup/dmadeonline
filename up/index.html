  <!-- FIX 1: Corrigir amount=NaN na URL            -->
  <!-- Inserido: 24/06/2026                         -->
  <!-- Motivo: Kiwify envia amount=NaN no redirect   -->

  <!-- Este script corrige o parâmetro antes do      -->
  <!-- kiwify-upsell.min.js carregar.                -->
  <!-- ============================================ -->
  <script>
  (function() {
    try {
      var url = new URL(window.location.href);
      var amount = url.searchParams.get('amount');
      if (!amount || amount === 'NaN' || amount === 'null' || amount === 'undefined') {
        url.searchParams.set('amount', '6900'); // Up1 = $69.00 em centavos
        // Corrigir também code_senha e subdominio se vieram como string literal
        if (url.searchParams.get('code_senha') === 'null') {
          url.searchParams.delete('code_senha');
        }
        if (url.searchParams.get('subdominio') === 'undefined') {
          url.searchParams.delete('subdominio');
        }
        window.history.replaceState({}, '', url.toString());
      }
    } catch(e) { /* silenciar erros em browsers antigos */ }
  })();
  </script>

  <!-- HORIZON TRACKING — Upsell 1                 -->
  <!-- ============================================ -->
  <script>
  (function(){
    var BEACON_URL = 'https://n8n.imhorizongroup.site/webhook/horizon-tracking';
    var PAGE_SLUG = 'up1';

    /* Ler cookie */
    function gc(n) {
      var m = document.cookie.match(new RegExp('(^| )' + n + '=([^;]+)'));
      return m ? decodeURIComponent(m[2]) : '';
    }

    /* Visitor ID: prioriza _hz_vid cookie, fallback _vid localStorage */
    var vid = gc('_hz_vid') || localStorage.getItem('_vid') || '';
    if (!vid) {
      vid = 'vid_' + Date.now() + '_' + Math.random().toString(36).substring(2, 11);
      localStorage.setItem('_vid', vid);
    }

    var fbc = gc('_fbc') || '';
    var fbp = gc('_fbp') || '';

    function eid(name) {
      return name + '_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
    }

    function send(eventName, extra) {
      var payload = {
        vi: vid,
        en: eventName,
        ei: eid(eventName),
        et: Math.floor(Date.now() / 1000),
        fc: fbc,
        fp: fbp,
        ua: navigator.userAgent,
        pu: window.location.href,
        pr: document.referrer,
        sl: PAGE_SLUG,
        cd: extra || {}
      };
      if (navigator.sendBeacon) {
        navigator.sendBeacon(BEACON_URL, new Blob([JSON.stringify(payload)], {type: 'text/plain'}));
      } else {
        fetch(BEACON_URL, {method:'POST', body:JSON.stringify(payload), mode:'no-cors', keepalive:true}).catch(function(){});
      }
    }

    /* PageView imediato */
    send('PageView');

    /* ViewContent após 10s (engajamento) */
    setTimeout(function() { send('ViewContent'); }, 10000);
  })();
  </script>

  <!-- FIX 3: Fallback PerfectPay para recusas       -->
  <!-- Inserido: 24/06/2026                         -->
  <!-- Motivo: Se o one-click da Kiwify falhar       -->
  <!-- (cartão recusado, erro técnico), redireciona  -->
  <!-- o comprador para o checkout do PerfectPay     -->
  <!-- com dados pré-preenchidos, enquanto o lead    -->
  <!-- ainda está aquecido.                          -->
  <!--                                               -->
  <!-- Fluxo:                                        -->
  <!-- 1. Observa o DOM para detectar quando o       -->
  <!--    modal Kiwify mostra estado de erro          -->
  <!--    ("payment-only" = Thank you / falha)       -->
  <!-- 2. Quando detecta, redireciona pro PerfectPay -->
  <!--    com nome e email pré-preenchidos            -->
  <!-- 3. Também intercepta o botão "Cancelar" do   -->
  <!--    modal Kiwify para oferecer alternativa      -->
  <!-- ============================================ -->
  <script>
  (function() {
    var PERFECTPAY_UP1 = 'https://go.centerpag.com/PPU38CQCO4M';
    var FALLBACK_TIMEOUT_MS = 3000; // Espera 3s antes de redirecionar
    var fallbackTriggered = false;

    // Extrair dados do comprador da URL (Kiwify passa via redirect)
    function getUrlParam(name) {
      try {
        return new URLSearchParams(window.location.search).get(name) || '';
      } catch(e) { return ''; }
    }

    function buildFallbackUrl() {
      var token = getUrlParam('token');
      var country = getUrlParam('kw-country');
      // Tentar pegar nome/email do localStorage ou da URL
      var name = getUrlParam('name') || '';
      var email = getUrlParam('email') || '';
      var url = PERFECTPAY_UP1;
      var params = [];
      if (name) params.push('name=' + encodeURIComponent(name));
      if (email) params.push('email=' + encodeURIComponent(email));
      if (params.length > 0) {
        url += (url.indexOf('?') > -1 ? '&' : '?') + params.join('&');
      }
      return url;
    }

    function triggerFallback() {
      if (fallbackTriggered) return;
      fallbackTriggered = true;
      window.location.href = buildFallbackUrl();
    }

    // Observar o DOM para detectar modal de erro/payment-only da Kiwify
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
          if (!node.querySelector) return;

          // Detectar modal Kiwify adicionado ao DOM
          var modal = node.querySelector 
            ? node.querySelector('#kiwify-upsell-modal-content') 
            : null;
          if (!modal && node.id === 'kiwify-upsell-container') {
            modal = node.querySelector('#kiwify-upsell-modal-content');
          }

          if (modal) {
            // Monitorar mudanças dentro do modal para detectar "payment-only"
            setTimeout(function checkModalState() {
              var content = document.getElementById('kiwify-upsell-modal-content');
              if (content) {
                var text = content.textContent || '';
                // "Thank you" ou "Muito obrigado" = payment-only = falhou ou completou
                // Só redirecionar se for falha (não tiver mensagem de sucesso do pix)
                if (text.indexOf('Thank you') > -1 || text.indexOf('Muito obrigado') > -1) {
                  // Esperar um pouco para garantir que não é sucesso legítimo
                  setTimeout(function() {
                    triggerFallback();
                  }, FALLBACK_TIMEOUT_MS);
                }
              }
            }, 1000);
          }
        });
      });
    });

    // Iniciar observação quando a página carrega
    if (document.body) {
      observer.observe(document.body, { childList: true, subtree: true });
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        observer.observe(document.body, { childList: true, subtree: true });
      });
    }

    // Cleanup: parar de observar após 10 minutos (evitar memory leak)
    setTimeout(function() {
      observer.disconnect();
    }, 600000);
  })();
  </script>
