  <div id="upsell-page">

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    /* Anti back-button → redireciona pro downsell 1 */
    (function() {
      history.pushState(null, '', location.href);
      window.addEventListener('popstate', function() {
        history.pushState(null, '', location.href);
        window.location.href = '/down/D1';
      });
    })();

    /* Anti-DevTools */
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12') { e.preventDefault(); return false; }
      if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
      if (e.ctrlKey && ['U','S'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
    });
    document.addEventListener('dragstart', function(e) { e.preventDefault(); });
  </script>

  <!-- ============================================ -->
  <!-- HORIZON TRACKING — Upsell 1                 -->
  <!-- ============================================ -->
  <script>
  (function(){
    var BEACON_URL = 'https://n8n.imhorizongroup.site/webhook/horizon-tracking';
    var PAGE_SLUG = 'up1';

    /* Ler cookie */
    function gc(n) {
      var m = document.cookie.match(new RegExp('(^| )' + n + '=([^;]+)'));
      return m ? decodeURIComponent(m[2]) : '';
    }

    /* Visitor ID: prioriza _hz_vid cookie, fallback _vid localStorage */
    var vid = gc('_hz_vid') || localStorage.getItem('_vid') || '';
    if (!vid) {
      vid = 'vid_' + Date.now() + '_' + Math.random().toString(36).substring(2, 11);
      localStorage.setItem('_vid', vid);
    }

    var fbc = gc('_fbc') || '';
    var fbp = gc('_fbp') || '';

    function eid(name) {
      return name + '_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
    }

    function send(eventName, extra) {
      var payload = {
        vi: vid,
        en: eventName,
        ei: eid(eventName),
        et: Math.floor(Date.now() / 1000),
        fc: fbc,
        fp: fbp,
        ua: navigator.userAgent,
        pu: window.location.href,
        pr: document.referrer,
        sl: PAGE_SLUG,
        cd: extra || {}
      };
      if (navigator.sendBeacon) {
        navigator.sendBeacon(BEACON_URL, new Blob([JSON.stringify(payload)], {type: 'text/plain'}));
      } else {
        fetch(BEACON_URL, {method:'POST', body:JSON.stringify(payload), mode:'no-cors', keepalive:true}).catch(function(){});
      }
    }

    /* PageView imediato */
    send('PageView');

    /* ViewContent após 10s (engajamento) */
    setTimeout(function() { send('ViewContent'); }, 10000);
  })();
  </script>
